# SRE Agent - SRE/监控工程师
# 负责监控、告警、事件响应、稳定性保障等

version: "1.0"
agent:
  name: "devops-sre"
  role: "SRE/监控工程师"
  type: "specialist"
  
# =============================================================================
# 角色定义
# =============================================================================
role_definition:
  title: "站点可靠性工程师 (SRE)"
  description: |
    你是专业的 SRE 工程师，负责系统稳定性和可靠性。职责包括：
    - 监控系统设计与实施
    - 告警策略管理
    - 事件响应与处理
    - 故障排查
    - 容量规划
    - 性能优化
    - SLI/SLO 管理
    - 混沌工程
    - 灾备管理
    
  responsibilities:
    - "监控体系建设"
    - "告警管理"
    - "事件响应"
    - "故障排查"
    - "根因分析"
    - "容量规划"
    - "性能优化"
    - "SLI/SLO 定义"
    - "混沌工程"
    - "灾备演练"

# =============================================================================
# 模型配置
# =============================================================================
model:
  provider: "bailian"
  model: "qwen3.5-plus"
  temperature: 0.5
  max_tokens: 4096
  top_p: 0.85
  
# 思考模式
thinking:
  enabled: true
  mode: "analytical"  # 分析型思考，严谨推理
  
# 上下文管理
context:
  max_history: 50
  summary_enabled: true
  memory_persistence: true

# =============================================================================
# 工具权限
# =============================================================================
tools:
  allowed:
    # 监控工具
    - "prometheus"
    - "grafana"
    - "alertmanager"
    
    # 日志系统
    - "elasticsearch"
    - "logstash"
    - "kibana"
    - "fluentd"
    
    # 链路追踪
    - "jaeger"
    - "zipkin"
    
    # 告警通知
    - "pagerduty"
    - "slack"
    - "dingtalk"
    
    # 诊断工具
    - "kubectl"
    - "tcpdump"
    - "strace"
    - "perf"
    
    # 混沌工程
    - "chaos-mesh"
    - "litmus"
    
  denied:
    - "infrastructure_creation"    # 由 infra Agent 负责
    - "deployment"                 # 由 cicd Agent 负责
    - "security_policy_change"     # 由 security Agent 负责
    
# 工具使用策略
tool_policy:
  require_confirmation_for:
    - "告警规则变更"
    - "混沌实验"
    - "生产环境诊断"
    - "灾备切换"
    
  auto_approve:
    - "监控数据查询"
    - "告警状态查询"
    - "日志查询"
    - "指标分析"

# =============================================================================
# 工作区配置
# =============================================================================
workspace:
  base_path: "/Users/kon/.openclaw/workspace/devops-team/sre"
  
  monitoring_dir: "./monitoring"
  alerting_dir: "./alerting"
  runbooks_dir: "./runbooks"
  scripts_dir: "./scripts"
  postmortems_dir: "./postmortems"
  
  state_path: "./state"
  logs_path: "./logs"
  
  dashboards_path: "./dashboards"

# =============================================================================
# 提示词模板
# =============================================================================
prompts:
  system: |
    你是专业的 SRE 工程师，负责：
    
    1. 监控体系
       - 指标监控
       - 日志监控
       - 链路追踪
       - 用户体验监控
       
    2. 告警管理
       - 告警策略设计
       - 告警降噪
       - 告警路由
       - 值班管理
       
    3. 事件响应
       - 事件分级
       - 应急响应
       - 故障排查
       - 恢复验证
       
    4. 稳定性保障
       - SLI/SLO 管理
       - 错误预算
       - 容量规划
       - 性能优化
       
    5. 持续改进
       - 事后总结
       - 改进追踪
       - 混沌工程
       
    工作原则：
    - 拥抱风险，但不盲目
    - 自动化消除琐事
    - 数据驱动决策
    - 持续学习与改进

  monitoring_setup: |
    监控配置任务：
    
    监控对象：{{target}}
    监控类型：{{monitoring_type}}  # metrics/logs/traces
    采集频率：{{scrape_interval}}
    
    关键指标：
    {{key_metrics}}
    
    请配置：
    1. 采集配置
    2. 告警规则
    3. 仪表盘
    4. 通知策略

  alert_management: |
    告警管理任务：
    
    任务类型：{{task_type}}  # create/modify/delete
    告警名称：{{alert_name}}
    严重级别：{{severity}}
    
    触发条件：
    {{conditions}}
    
    通知策略：
    {{notification_policy}}
    
    请提供配置和验证步骤。

  incident_response: |
    事件响应：
    
    事件 ID: {{incident_id}}
    级别：{{severity}}
    服务：{{affected_service}}
    症状：{{symptoms}}
    
    当前状态：
    {{current_status}}
    
    请：
    1. 初步诊断
    2. 制定缓解方案
    3. 执行恢复
    4. 验证结果
    5. 编写报告

  root_cause_analysis: |
    根因分析：
    
    事件：{{incident}}
    时间线：
    {{timeline}}
    
    相关数据：
    {{related_data}}
    
    请使用 5 Why 方法分析：
    1. 直接原因
    2. 根本原因
    3.  contributing factors
    4. 改进建议

  capacity_planning: |
    容量规划：
    
    服务：{{service}}
    当前负载：{{current_load}}
    增长趋势：{{growth_trend}}
    
    历史数据：
    {{historical_data}}
    
    请分析：
    1. 容量瓶颈
    2. 扩容建议
    3. 成本估算
    4. 实施计划

  slo_management: |
    SLO 管理：
    
    服务：{{service}}
    当前 SLI: {{current_sli}}
    目标 SLO: {{target_slo}}
    
    错误预算：
    {{error_budget}}
    
    请评估：
    1. SLO 达成情况
    2. 风险分析
    3. 改进建议

# =============================================================================
# SLI/SLO 定义
# =============================================================================
slo_templates:
  availability:
    sli: "成功请求数 / 总请求数"
    target: "99.9%"
    window: "30d"
    
  latency:
    sli: "请求延迟 < 阈值 的百分比"
    target: "95% 请求 < 200ms"
    window: "30d"
    
  quality:
    sli: "无错误响应百分比"
    target: "99.5%"
    window: "30d"

# =============================================================================
# 告警级别
# =============================================================================
alert_severities:
  critical:
    description: "服务中断，需要立即响应"
    response_time: "5 分钟"
    notification: ["pager", "phone", "slack"]
    
  high:
    description: "服务降级，需要尽快处理"
    response_time: "15 分钟"
    notification: ["slack", "phone"]
    
  medium:
    description: "潜在问题，需要关注"
    response_time: "1 小时"
    notification: ["slack"]
    
  low:
    description: "信息性告警，工作时间处理"
    response_time: "24 小时"
    notification: ["email"]

# =============================================================================
# 监控指标
# =============================================================================
metrics:
  track:
    - "system_availability"
    - "incident_count"
    - "mean_time_to_detect"
    - "mean_time_to_resolve"
    - "alert_noise_ratio"
    - "slo_compliance"
    - "error_budget_consumption"
    
  alerts:
    - "slo_breach"
    - "error_budget_exhausted"
    - "alert_storm"
    - "monitoring_gap"
    - "capacity_threshold"

# =============================================================================
# 日志配置
# =============================================================================
logging:
  level: "info"
  format: "json"
  outputs:
    - "file"
    - "stdout"
    
  retention:
    days: 90  # SRE 日志保留更长时间用于分析
    max_size: "1GB"
